{% extends 'base/template.html' %}
{% load static %}


{% block additionalStyle %}
<link rel="stylesheet" href="{% static 'css/user_view.css' %}" />

{% endblock %}

{% block page_content %}
<div class="user-card">
    <form method="post" class="user-form">
        <h1>LOGIN</h1>
        {{ loginform.as_p }}

        {% csrf_token %}

        <button type="submit" class="div-button">LOGIN</button>
        <div class="div-button whole-space" hx-on:click="htmx.trigger(this, 'openLink');" data-linkID="register_user">
            REGISTER
        </div>

    </form>
    {% endblock %}
